<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script
  src="https://code.jquery.com/jquery-3.3.1.min.js"
  integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
  crossorigin="anonymous"
  ></script>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://trello.com/1/client.js?key=4a4f3be9aaba4f56cfa5e357258f1c2e"></script>
</head>
<body>
  <textarea id="js-textarea"></textarea>

  <!-- Collect all cards from list and parse to csv to be imported by sheets -->
  <script>
    var t = TrelloPowerUp.iframe()

    const list = t.arg('list')
    console.log('list: ', list)

    const cards = list.cards
    // const head = "Nome,Github,Jira,Finalizado em,Trello,Projeto"

    let csv = cards.map((card) => {
      const name = card.name.replace(',', '');
      const gitHubLink = card.attachments.find((at) => at.url.includes('//github.com'))?.url || '-';
      let jiraLink = card.attachments.find((at) => at.url.includes('https://clicksign.atlassian.net/'))?.url
      jiraLink ??= card.desc.match(/^https:\/\/clicksign.atlassian.net\/browse\/[a-z0-9-]+/i)?.at(0) || '-'
      const finishedAt = card.dateLastActivity;
      const url = card.url;
      const project = card.labels.find(({name}) => name.includes('3 - '))?.name;

      return `${name},${gitHubLink},${jiraLink},${finishedAt},${url},${project}`
    });

    // csv = [head, ...csv];

    const parsed = csv.join('\n');

    document.querySelector('#js-textarea').value = parsed
    document.querySelector('#js-textarea').select()
    
    // Not allowed by iframe
    // document.querySelector('#js-copy').addEventListener('click', () => {
      // navigator.clipboard.writeText(parsed)
      // window.showSaveFilePicker();
    // });
  </script>
</body>
</html>
